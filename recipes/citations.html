<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Citations</title>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
  <style>
    body{font-family: 'Varela Round', sans-serif;margin:0;padding:24px;background:#fff;color:#111}
    h1{font-size:28px;margin-bottom:12px}
    .note{color:#555;margin-bottom:18px}
    .cite{background:#f8f8f8;border:1px solid #eee;padding:12px;border-radius:6px;margin-bottom:10px}
    a{color:#0b66c3}
    .back{display:inline-block;margin-top:18px;padding:8px 12px;border:1px solid #ddd;border-radius:6px;text-decoration:none;color:black;background:#fff}
  </style>
</head>
<body>
  <h1>Citations (Website inspiration)</h1>
  <p class="note">The following websites were used as visual or interaction inspiration. Formatted in APA style.</p>
  <div id="citationsContainer"></div>

  <a class="back" href="../index.html">Back to Home</a>

  <script>
    (function(){
      const citations = [
        {org: 'Tasty', title: 'Tasty', url: 'https://tasty.co/'},
        {org: 'Crumbl Cookies', title: 'Crumbl Cookies', url: 'https://crumblcookies.com/'},
        {org: 'Web Design Inspiration', title: 'Web Design Inspiration', url: 'https://www.webdesign-inspiration.com/'}
      ];

      const now = new Date();
      const opts = { year: 'numeric', month: 'long', day: 'numeric' };
      const dateStr = now.toLocaleDateString('en-US', opts);

      const container = document.getElementById('citationsContainer');
      citations.forEach(c => {
        const d = document.createElement('div');
        d.className = 'cite';
        d.textContent = `${c.org}. (n.d.). ${c.title}. Retrieved ${dateStr}, from ${c.url}`;
        container.appendChild(d);
      });
    })();
  </script>
</body>
</html>
