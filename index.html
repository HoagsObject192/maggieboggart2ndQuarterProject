<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooked</title>


<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">


<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
font-family: "Varela Round", sans-serif; 
overflow-x: hidden;
}


.hero {
  height: 90vh;
  background-color: #f1d2e1; 
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.hero-text {
  font-size: 14vw;
  letter-spacing: 8px;
  color: transparent;
  -webkit-text-stroke: 3px rgb(0, 0, 0);
  text-align: center;
  transition: transform 0.3s ease;
  cursor: pointer;
}


.hero-text:hover {
  transform: scale(1.08) translateY(-5px);
}


.scroll-btn {
  position: absolute;
  bottom: 40px;
  background: none;
  border: none;
  font-size: 40px;
  cursor: pointer;
  color: rgb(0, 0, 0);
  transition: transform 0.2s ease;
}

.scroll-btn:hover {
  transform: translateY(5px);
  color:#f7c1db
}


.whisk-btn {
  position: absolute;
  top: 30px;
  left: 30px;
  background: none;
  border: none;
  font-size: 28px;
  cursor: pointer;
  color: white;
  z-index: 1001;
}


.side-menu {
  position: fixed;
  top: 0;
  left: -300px;
  height: 100vh;
  width: 300px;
  background: white;
  padding: 60px 30px;
  transition: left 0.4s ease;
  z-index: 1000;
}

.side-menu.active {
  left: 0;
}

.side-menu ul {
  list-style: none;
  padding-top: 80px;
}

.side-menu a {
  color: black;
  text-decoration: none;
  transition: color 0.2s ease;
}

.side-menu a:hover {
  color: #f1d2e1;
}

.side-menu a:visited {
  color: black;
}

.side-menu li {
  margin-bottom: 20px;
  font-size: 28px;
}


.next-section {
  height: 100vh;
  background: white;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  padding: 0vh 20px 40px 20px;
}

.recommendation-title {
  font-size: 5vw;
  color: black;
  margin-bottom: 40px;
  margin-top: 46px;
  text-align: left;
  margin-left: 40px;
}

.recipe-box {
  background-color: #f1d2e1;
  border: 3px solid black;
  padding: 50px;
  border-radius: 10px;
  max-width: 1400px;
  min-height: 200px;
  text-align: left;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  display: flex;
  gap: 30px;
  align-items: center;
  margin-left: 40px;
  margin-right: 40px;
}

.recipe-box-image {
  flex-shrink: 0;
  width: 150px;
  height: 150px;
}

.recipe-box-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow: hidden;
}

.recipe-box-content h3 {
  margin: 0;
  flex-shrink: 0;
}

.recipe-box-content p {
  margin: 0;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.recipe-box h3 {
  color: black;
  font-size: 18px;
  margin: 0;
}

.recipe-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 5px;
  max-width: 150px;
  max-height: 150px;
}

.recipe-box p {
  color: black;
  font-size: 16px;
}

.recipe-btn {
  background-color: black;
  border: 2px solid black;
  color: white;
  padding: 12px 30px;
  font-size: 18px;
  font-family: "Varela Round", sans-serif;
  border-radius: 5px;
  cursor: pointer;
  margin-top: 20px;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.recipe-btn:hover {
  background-color: white;
  color: #000000;
  border-color: #f1d2e1;
}

.cat-icon {
  width: 210px;
  height: 180px;
  vertical-align: middle;
  display: inline-block;
}

.loading-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: #f1d2e1;
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.loading-overlay.active {
  display: flex;
}

.loading-overlay img {
  width: 150px;
  height: 150px;
  animation: spin 2s linear infinite;
}

@keyframes spin {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}
</style>
</head>
<body>


<div class="side-menu" id="menu">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="recipes/cooking-basics.html">Cooking Basics</a></li>
    <li><a href="recipes/appetizers.html">Appetizers</a></li>
    <li><a href="recipes/mains.html">Mains</a></li>
    <li><a href="recipes/desserts.html">Desserts</a></li>
    <li><a href="indecisive.html">Indecisive</a></li>
    <li><a href="playlists.html">Playlists</a></li>
    <li><a href="recipes/aboutus.html">About Us</a></li>
  </ul>
</div>

<div class="loading-overlay" id="loading">
  <img src="recipes/media/moggart.png" alt="Loading...">
</div>


<section class="hero">
  <button class="whisk-btn" onclick="toggleMenu()"><img src="recipes/media/whisk.png" style="width: 65px; height: 65px;"></button>

  <h1 class="hero-text">C<img src="recipes/media/moggart.png" class="cat-icon">OKED</h1>

  <button class="scroll-btn" onclick="scrollDown()">↓</button>
</section>.


<section class="next-section">
  <h2 class="recommendation-title">Chef Moggart's Recommendation</h2>
  <div class="recipe-box" id="recipeBox">
    <img id="recipeImage" src="" alt="Recipe Image" class="recipe-box-image">
    <div class="recipe-box-content">
      <h3 id="recipeName">Loading...</h3>
      <p id="recipeDesc">Generating recipe...</p>
      <button class="recipe-btn" id="goToRecipeBtn" onclick="goToRecipe()">Go to Recipe</button>
    </div>
  </div>
</section>

<script>
// recco recipes
const recipes = [
  { name: "Burger", image: "recipes/media/burger.png", desc: "A juicy beef patty is paired with melted cheese, fresh lettuce, and ripe tomatoes inside a soft bun. Each bite balances tender meat, crisp veggies, and pillowy bread. The ultimate comfort food classic.", link: "recipes/burger.html" },
  { name: "Tacos", image: "recipes/media/tacos.png", desc: "Tender, seasoned chicken is tucked into warm tortillas with fresh toppings like salsa and cilantro. Smoky, savory spices mingle with bright, zesty notes. A flavorful and fun handheld meal.", link: "recipes/tacos.html" },
  { name: "Chocolate Chip Cookies", image: "recipes/media/choccookies.png", desc: "Golden-brown cookies with a chewy center are studded with rich chocolate chips. Sweet, buttery, and irresistibly soft. A nostalgic treat that melts in your mouth.", link: "recipes/choccookies.html" },
  { name: "Caesar Salad", image: "recipes/media/Caesar.jpg", desc: "Crisp romaine lettuce is tossed in a creamy, garlicky dressing with Parmesan and crunchy croutons. Each bite is fresh and savory, with a satisfying crunch. A classic salad that feels both light and indulgent.", link: "recipes/caesar.html" },
  { name: "French Fries", image: "recipes/media/French_Fries.jpg", desc: "French fries, a fast food staple and an appetizer kids love. It is a dish of salty and evenly cut strips of potatoes. It can be made in many ways, as thickness and cooking methods can vary.", link: "recipes/French%20Fries.html" },
  { name: "Cinnamon Roll", image: "recipes/media/cinnamon.png", desc: "Cinnamon rolls originated in Northern Europe, particularly Sweden, where kanelbullar became a traditional sweet bread enjoyed with coffee. They have a warm, comforting flavor profile dominated by aromatic cinnamon, rich butter, and soft yeasty dough.", link: "recipes/cinnaroll.html" },
  { name: "Chili Garlic Pasta", image: "recipes/media/chili.png", desc: "Slippery noodles are coated in a spicy, aromatic chili-garlic sauce. Chewy noodles meet bold, savory flavors in every bite. A comforting dish with a satisfying kick.", link: "recipes/chiligarlic.html" },
  { name: "Mac n Cheese", image: "recipes/media/Mac.jpg", desc: "Mac and cheese is a comfort food dish made with macaroni pasta and a cheese sauce. It is a known side dish in American cuisine, often served as an appetizer or main course. Mac and cheese is creamy and cheesy.", link: "recipes/Mac%20n%20Cheese.html" },
  { name: "Jeremiah Cake", image: "recipes/media/Jeremiah.jpg", desc: "This cake shows how big of a red flag Jeremiah is. It is a towering multi-layered cake adorned with rich and glossy decorations, symbolizing his extravagant and over-the-top personality.", link: "recipes/jeremiah-cake.html" }
];

let currentRecipe = null;

function generateRandomRecipe() {
  currentRecipe = recipes[Math.floor(Math.random() * recipes.length)];
  document.getElementById('recipeName').textContent = currentRecipe.name;
  document.getElementById('recipeImage').src = currentRecipe.image;
  document.getElementById('recipeDesc').textContent = currentRecipe.desc;
}

function goToRecipe() {
  if (currentRecipe) {
    const loadingOverlay = document.getElementById('loading');
    loadingOverlay.classList.add('active');
    
    setTimeout(function() {
      window.location.href = currentRecipe.link;
    }, 2000);
  }
}

//reccomendation of moggart
generateRandomRecipe();

//every ten mins yung loading change it if u think its too long
setInterval(generateRandomRecipe, 600000);

function scrollDown() {
  document.querySelector('.next-section').scrollIntoView({
    behavior: 'smooth'
  });
}

function toggleMenu() {
  document.getElementById('menu').classList.toggle('active');
}

// show loading screen
document.addEventListener('click', function(event) {
  const link = event.target.closest('a');
  if (link && !link.hasAttribute('target')) {
    const href = link.getAttribute('href');
    if (href && !href.startsWith('#') && !href.startsWith('javascript')) {
      event.preventDefault();
      const loadingOverlay = document.getElementById('loading');
      loadingOverlay.classList.add('active');
      
      setTimeout(function() {
        window.location.href = href;
      }, 2000);
    }
  }
});
</script>

</body>
</html>
