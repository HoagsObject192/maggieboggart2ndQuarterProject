    <style>
        body {
            margin: 0;
            font-family: "Varela Round", sans-serif;
            background-color: #ffffff;
            color: #333;
            overflow-x: hidden;
            text-align: center;
        }

        .whisk-btn {
  position: fixed;
  top: 30px;
  left: 30px;
  background: none;
  border: none;
  font-size: 28px;
  cursor: pointer;
  color: black;
  z-index: 1001;
}


.side-menu {
  position: fixed;
  top: 0;
  left: -300px;
  height: 100vh;
  width: 300px;
  background: white;
  padding: 60px 30px;
  transition: left 0.4s ease;
  z-index: 1000;
  text-align: left;
}

.side-menu.active {
  left: 0;
}

.side-menu ul {
  list-style: none;
  padding-top: 80px;
}

.side-menu a {
  color: black;
  text-decoration: none;
  transition: color 0.2s ease;
}

.side-menu a:hover {
  color: #f1d2e1 !important;
  background-color: transparent !important;
  font-size: inherit !important;
}

.side-menu a:visited {
  color: black;
}

.side-menu li {
  margin-bottom: 20px;
  font-size: 28px;
}

        .loading-overlay {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: #f1d2e1;
          z-index: 9999;
          justify-content: center;
          align-items: center;
        }

        .loading-overlay.active {
          display: flex;
        }

        .loading-overlay img {
          width: 150px;
          height: 150px;
          animation: spin 2s linear infinite;
        }

        @keyframes spin {
          0% {
            transform: rotate(0deg);
          }
          100% {
            transform: rotate(360deg);
          }
        }

.search-section {
  background: white;
  padding: 40px 20px 15px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  min-height: auto;
}

.search-container {
  width: 100%;
  max-width: 600px;
  display: flex;
  gap: 10px;
}

.search-input {
  flex: 1;
  padding: 12px 16px;
  font-size: 16px;
  border: 2px solid black;
  border-radius: 5px;
  font-family: "Varela Round", sans-serif;
  transition: border-color 0.2s ease;
}

.search-input:focus {
  outline: none;
  border-color: #f1d2e1;
  box-shadow: 0 0 8px rgba(241, 210, 225, 0.5);
}

.search-results {
  width: 100%;
  max-width: 1400px;
  padding: 0 20px;
  margin-top: 20px;
}

.search-results-horizontal {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  padding-bottom: 10px;
  scroll-behavior: smooth;
}

.search-results-horizontal::-webkit-scrollbar {
  height: 6px;
}

.search-results-horizontal::-webkit-scrollbar-track {
  background: #f1f1f1;
  border-radius: 10px;
}

.search-results-horizontal::-webkit-scrollbar-thumb {
  background: #f1d2e1;
  border-radius: 10px;
}

.search-results-horizontal::-webkit-scrollbar-thumb:hover {
  background: #e6b8ce;
}

.recipe-chip {
  background-color: white;
  border: 2px solid #ddd;
  border-radius: 20px;
  padding: 8px 16px;
  white-space: nowrap;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s ease;
  flex-shrink: 0;
  color: #333;
}

.recipe-chip:hover {
  border-color: #f1d2e1;
  background-color: #f1f1f1;
  transform: translateY(-2px);
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

.recipe-card {
  background-color: white;
  border: 2px solid #ddd;
  border-radius: 8px;
  padding: 15px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  flex-shrink: 0;
  width: 240px;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.recipe-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
  border-color: #f1d2e1;
}

.recipe-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 5px;
  margin-bottom: 10px;
}

.recipe-card h3 {
  margin: 8px 0;
  font-size: 16px;
  color: black;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.recipe-card p {
  font-size: 12px;
  color: #666;
  margin-bottom: 10px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  min-height: 28px;
}

.recipe-card-btn {
  background-color: #f1d2e1;
  border: 1px solid #ddd;
  color: black;
  padding: 6px 14px;
  font-size: 12px;
  font-family: "Varela Round", sans-serif;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  width: 100%;
}

.recipe-card-btn:hover {
  background-color: black;
  color: white;
  border-color: black;
}

.no-results {
  text-align: center;
  padding: 20px;
  font-size: 16px;
  color: #999;
}

        footer {
            background-color: rgba(248, 201, 212, 0.75);
            backdrop-filter: blur(4px);
            text-align: center;
            padding: 15px;

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {
            h1 {
                font-size: 24px;

            .search-container {
                flex-direction: column;
            }

            .recipe-card {
                width: 180px;
            }

            .recipe-card img {
                height: 110px;
            }

            main {
                padding: 20px 15px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 18px;
                margin-bottom: 15px;
            }

            .search-section {
                padding: 15px 10px;
            }

            .search-input {
                padding: 8px 10px;
                font-size: 13px;
            }

            .recipe-card {
                width: 140px;
            }

            .recipe-card img {
                height: 90px;
            }

            .recipe-card h3 {
                font-size: 13px;
            }

            .recipe-card p {
                font-size: 11px;
            }

            .recipe-card-btn {
                padding: 5px 10px;
                font-size: 11px;
            }

            main {
                padding: 15px 10px;
            }

            footer {
                padding: 10px 5px;
                font-size: 12px;
            }
        }

    <script>
        function toggleMenu() {
          document.getElementById('menu').classList.toggle('active');
        }

        // show loading screen
        document.addEventListener('click', function(event) {
          const link = event.target.closest('a');
          if (link && !link.hasAttribute('target')) {
            const href = link.getAttribute('href');
            if (href && !href.startsWith('#') && !href.startsWith('javascript') && !href.startsWith('https') && !href.startsWith('http')) {
              event.preventDefault();
              const loadingOverlay = document.getElementById('loading');
              loadingOverlay.classList.add('active');
              
              setTimeout(function() {
                window.location.href = href;
              }, 2000);
            }
          }
        });
    </script>
<script>
const recipes = [

];

function performSearch() {
  const searchInput = document.getElementById('searchInput').value.toLowerCase().trim();
  const resultsContainer = document.getElementById('searchResults');
  
  if (!searchInput) {
    resultsContainer.innerHTML = '';
    return;
  }
  
  const filteredRecipes = recipes.filter(recipe => 
    recipe.name.toLowerCase().includes(searchInput) || 
    recipe.desc.toLowerCase().includes(searchInput)
  );
  
  if (filteredRecipes.length === 0) {
    resultsContainer.innerHTML = '<div class="no-results">No recipes found. Try searching for something else!</div>';
    return;
  }
  
  const resultsHTML = `
    <div class="search-results-horizontal">
      ${filteredRecipes.map(recipe => `
        <div class="recipe-card" onclick="navigateToRecipe('${recipe.link}')">
          <img src="${recipe.image}" alt="${recipe.name}">
          <h3>${recipe.name}</h3>
          <p>${recipe.desc}</p>
          <button class="recipe-card-btn">View</button>
        </div>
      `).join('')}
    </div>
  `;
  
  resultsContainer.innerHTML = resultsHTML;
}

function navigateToRecipe(link) {
  const loadingOverlay = document.getElementById('loading');
  if (loadingOverlay) {
    loadingOverlay.classList.add('active');
  }
  
  setTimeout(function() {
    window.location.href = link;
  }, 2000);
}

document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', performSearch);
    searchInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        performSearch();
      }
    });
  }
});
</script>
